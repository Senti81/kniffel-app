name: Build Windows JavaFX (jlink)

on:
  push:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Build
        run: mvn -B -DskipTests clean package

      - name: Create runtime image (jlink)
        run: mvn -B -DskipTests javafx:jlink

      - name: Zip app image
        run: powershell Compress-Archive -Path target\app -DestinationPath kniffel-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kniffel-windows
          path: kniffel-windows.zip
